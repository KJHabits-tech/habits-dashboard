<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🌿 Habits Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0f14;
    --surface: #181b23;
    --surface2: #1e2230;
    --border: #2a2d38;
    --border2: #3a3f52;
    --text: #e8e8f0;
    --text2: #b0b4c8;
    --muted: #555a70;
    --muted2: #3a3f52;
    --muted3: #2e3340;
    --blue: #60a5fa;
    --green: #34d399;
    --orange: #fb923c;
    --purple: #c084fc;
    --font: 'DM Sans', 'Segoe UI', sans-serif;
    --mono: 'DM Mono', monospace;
  }
  html, body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }
  body { padding: 32px 24px 80px; }
  ::-webkit-scrollbar { height: 4px; width: 4px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .wrapper { max-width: 1100px; margin: 0 auto; }

  /* Header */
  .header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 32px; flex-wrap: wrap; gap: 16px; }
  .header-left .eyebrow { font-size: 11px; letter-spacing: .18em; color: var(--muted); font-family: var(--mono); margin-bottom: 6px; text-transform: uppercase; }
  .header-left h1 { font-size: 28px; font-weight: 600; letter-spacing: -.02em; color: #f0f0f8; }
  .header-right { display: flex; gap: 12px; align-items: center; }
  .today-count { text-align: right; }
  .today-count .label { font-size: 11px; color: var(--muted); font-family: var(--mono); letter-spacing: .1em; margin-bottom: 3px; }
  .today-count .score { font-size: 22px; font-weight: 600; }
  .today-count .score span { font-size: 14px; color: var(--muted); font-weight: 400; }
  .ring-wrap { position: relative; width: 52px; height: 52px; }
  .ring-wrap canvas { position: absolute; top: 0; left: 0; }
  .ring-pct { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; font-family: var(--mono); color: #888; }

  /* Grid scroll container */
  .grid-scroll { overflow-x: auto; padding-bottom: 8px; }
  .grid { min-width: 700px; }

  /* Column layout helper */
  .row { display: grid; grid-template-columns: 220px 60px repeat(14, 34px); gap: 0 2px; align-items: center; }

  /* Date header */
  .date-header { margin-bottom: 8px; align-items: flex-end; }
  .date-header .col-label { font-size: 10px; color: var(--muted2); font-family: var(--mono); text-align: center; }
  .day-head { text-align: center; padding: 4px 0; border-radius: 6px; transition: background .15s; }
  .day-head.today { background: rgba(96,165,250,.06); }
  .day-head .weekday { font-size: 9px; color: var(--muted2); font-family: var(--mono); letter-spacing: .05em; margin-bottom: 2px; }
  .day-head .datenum { font-size: 13px; font-weight: 400; color: var(--muted); }
  .day-head.today .weekday { color: var(--blue); }
  .day-head.today .datenum { color: var(--blue); font-weight: 600; }
  .day-head .monthlab { font-size: 8px; color: var(--muted3); font-family: var(--mono); }

  /* Score row */
  .score-row { margin-bottom: 16px; }
  .score-row .row-label { font-size: 10px; color: var(--muted3); font-family: var(--mono); padding-left: 8px; }
  .score-cell { display: flex; justify-content: center; }
  .score-box {
    width: 28px; height: 28px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-family: var(--mono); font-weight: 500;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--muted3);
    transition: all .2s;
  }

  /* Category section */
  .category-block { margin-bottom: 20px; }
  .cat-label-row { margin-bottom: 6px; }
  .cat-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .cat-name { font-size: 10px; font-family: var(--mono); letter-spacing: .12em; text-transform: uppercase; }
  .cat-label-inner { display: flex; align-items: center; gap: 7px; padding-left: 8px; }

  /* Habit row */
  .habit-row { border-radius: 8px; transition: background .15s; padding: 3px 0; margin-bottom: 3px; }
  .habit-row:hover { background: rgba(255,255,255,.02); }
  .habit-name { display: flex; align-items: center; gap: 8px; padding-left: 16px; overflow: hidden; }
  .habit-emoji { font-size: 14px; flex-shrink: 0; }
  .habit-label { font-size: 13px; color: var(--text2); font-weight: 400; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* Streak */
  .streak-cell { text-align: center; }
  .streak-pill {
    display: inline-flex; align-items: center; gap: 3px;
    padding: 2px 7px; border-radius: 20px;
    font-size: 10px; font-family: var(--mono); font-weight: 500; letter-spacing: .02em;
  }
  .streak-empty { font-size: 10px; color: var(--muted3); font-family: var(--mono); }

  /* Habit cells */
  .cell-wrap { display: flex; justify-content: center; }
  .cell-col.today-col { background: rgba(255,255,255,.02); border-radius: 6px; }
  button.cell {
    width: 28px; height: 28px; border-radius: 6px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s ease;
    outline: none;
  }
  button.cell:hover { border-color: var(--border2); background: var(--surface2); transform: scale(1.08); }
  button.cell.done { background: #1a2a1a; border-color: #2d5a2d; }
  button.cell.today { border-color: #3a4060; }
  button.cell.today.done { background: #1a2a35; border-color: #2a5a7a; }
  button.cell svg { pointer-events: none; }

  /* Legend */
  .legend { margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--surface2); display: flex; gap: 20px; flex-wrap: wrap; align-items: center; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); font-family: var(--mono); }
  .legend-swatch { width: 10px; height: 10px; border-radius: 3px; }
  .legend-note { font-size: 11px; color: var(--muted3); font-family: var(--mono); margin-left: auto; }
</style>
</head>
<body>
<div class="wrapper">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="eyebrow">Wellness Tracker</div>
      <h1>🌿 Habits Dashboard</h1>
    </div>
    <div class="header-right">
      <div class="today-count">
        <div class="label">TODAY</div>
        <div class="score" id="todayScore">0<span>/11</span></div>
      </div>
      <div class="ring-wrap">
        <canvas id="ringCanvas" width="52" height="52"></canvas>
        <div class="ring-pct" id="ringPct">0%</div>
      </div>
    </div>
  </div>

  <!-- Grid -->
  <div class="grid-scroll">
    <div class="grid" id="grid"></div>
  </div>

</div>

<script>
const HABITS = [
  { id:"pt",           label:"Personal Training",        emoji:"🏋️", category:"Movement"  },
  { id:"core",         label:"Core + Stretch Segment",   emoji:"💪", category:"Movement"  },
  { id:"water",        label:"Drink Water",              emoji:"💧", category:"Nutrition" },
  { id:"electrolyte",  label:"Electrolyte Drink",        emoji:"⚡", category:"Nutrition" },
  { id:"collagen_am",  label:"AM Collagen Shot",         emoji:"🌅", category:"Nutrition" },
  { id:"collagen_pm",  label:"PM Collagen Shot",         emoji:"🌙", category:"Nutrition" },
  { id:"pt_exercises", label:"PT Exercises",             emoji:"🦵", category:"Recovery"  },
  { id:"pigeon",       label:"Pigeon Stretch",           emoji:"🧘", category:"Recovery"  },
  { id:"s_stretch",    label:"S Stretch",                emoji:"🧘", category:"Recovery"  },
  { id:"quad",         label:"Quad Couch Stretch",       emoji:"🧘", category:"Recovery"  },
  { id:"red_light",    label:"Red Light Therapy",        emoji:"🔴", category:"Wellness"  },
];

const CATEGORIES = ["Movement","Nutrition","Recovery","Wellness"];
const CAT_COLORS = {
  Movement:  { dot:"#60a5fa", bg:"rgba(96,165,250,.12)",  border:"rgba(96,165,250,.3)"  },
  Nutrition: { dot:"#fb923c", bg:"rgba(251,146,60,.12)",  border:"rgba(251,146,60,.3)"  },
  Recovery:  { dot:"#34d399", bg:"rgba(52,211,153,.12)",  border:"rgba(52,211,153,.3)"  },
  Wellness:  { dot:"#c084fc", bg:"rgba(192,132,252,.12)", border:"rgba(192,132,252,.3)" },
};

// --- Data helpers ---
function loadData() {
  try { return JSON.parse(localStorage.getItem("habitData") || "{}"); } catch { return {}; }
}
function saveData(d) {
  try { localStorage.setItem("habitData", JSON.stringify(d)); } catch {}
}
let DATA = loadData();

function ck(habitId, dateKey) { return !!DATA[dateKey+"::"+habitId]; }
function toggle(habitId, dateKey) {
  DATA[dateKey+"::"+habitId] = !ck(habitId, dateKey);
  saveData(DATA);
  refresh();
}

// --- Date helpers ---
function getLast14() {
  const days = [];
  for (let i=13; i>=0; i--) {
    const d = new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate()-i); days.push(d);
  }
  return days;
}
function fmtKey(d) { return d.toISOString().split("T")[0]; }
function todayKey() { const d=new Date(); d.setHours(0,0,0,0); return fmtKey(d); }

function dayScore(dateKey) { return HABITS.filter(h=>ck(h.id,dateKey)).length; }
function habitStreak(habitId, days) {
  let s=0;
  for (let i=days.length-1; i>=0; i--) {
    if (ck(habitId, fmtKey(days[i]))) s++; else break;
  }
  return s;
}

// --- Ring canvas ---
function drawRing(pct) {
  const canvas = document.getElementById("ringCanvas");
  const ctx = canvas.getContext("2d");
  const cx=26, cy=26, r=22, lw=4;
  ctx.clearRect(0,0,52,52);
  // track
  ctx.beginPath(); ctx.arc(cx,cy,r,-Math.PI/2,Math.PI*1.5);
  ctx.strokeStyle="#1e2230"; ctx.lineWidth=lw; ctx.stroke();
  // fill
  if (pct>0) {
    ctx.beginPath(); ctx.arc(cx,cy,r,-Math.PI/2,-Math.PI/2+Math.PI*2*(pct/100));
    ctx.strokeStyle = pct===100?"#34d399":pct>=60?"#60a5fa":"#fb923c";
    ctx.lineWidth=lw; ctx.lineCap="round"; ctx.stroke();
  }
  document.getElementById("ringPct").textContent=pct+"%";
}

// --- Build / refresh grid ---
function refresh() {
  const days = getLast14();
  const tk = todayKey();
  const total = dayScore(tk);
  const pct = Math.round(total/HABITS.length*100);

  // header score
  const scoreEl = document.getElementById("todayScore");
  scoreEl.innerHTML = total+'<span>/'+HABITS.length+'</span>';
  scoreEl.style.color = pct===100?"#34d399":pct>=60?"#60a5fa":"#e8e8f0";
  drawRing(pct);

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  // ---- Date header row ----
  const headRow = document.createElement("div");
  headRow.className = "row date-header";
  headRow.innerHTML = '<div></div><div class="col-label">STREAK</div>';
  days.forEach((d,i)=>{
    const isToday = fmtKey(d)===tk;
    const showMonth = i===0 || d.getDate()<=3;
    const div = document.createElement("div");
    div.className = "day-head"+(isToday?" today":"");
    div.innerHTML = `
      <div class="weekday">${d.toLocaleDateString("en-US",{weekday:"short"}).toUpperCase()}</div>
      <div class="datenum">${d.getDate()}</div>
      <div class="monthlab">${showMonth?d.toLocaleDateString("en-US",{month:"short"}).toUpperCase():""}</div>
    `;
    headRow.appendChild(div);
  });
  grid.appendChild(headRow);

  // ---- Score row ----
  const scoreRow = document.createElement("div");
  scoreRow.className = "row score-row";
  scoreRow.innerHTML = '<div class="row-label">DAILY SCORE</div><div></div>';
  days.forEach(d=>{
    const dk = fmtKey(d);
    const sc = dayScore(dk);
    const p = sc/HABITS.length;
    const isToday = dk===tk;
    let bg="var(--surface)", border="var(--border)", color="var(--muted3)", txt="·";
    if (sc>0) {
      const rgb = p===1?"52,211,153":p>=.6?"96,165,250":"251,146,60";
      bg=`rgba(${rgb},${.15+p*.5})`;
      border=`rgba(${rgb},.4)`;
      color = p===1?"#34d399":p>=.6?"#60a5fa":"#fb923c";
      txt=sc;
    }
    const cell = document.createElement("div");
    cell.className="score-cell";
    cell.innerHTML=`<div class="score-box" style="background:${bg};border-color:${border};color:${color}">${txt}</div>`;
    scoreRow.appendChild(cell);
  });
  grid.appendChild(scoreRow);

  // ---- Category blocks ----
  CATEGORIES.forEach(cat=>{
    const habits = HABITS.filter(h=>h.category===cat);
    const colors = CAT_COLORS[cat];
    const block = document.createElement("div");
    block.className = "category-block";

    // cat label row
    const catRow = document.createElement("div");
    catRow.className = "row cat-label-row";
    catRow.innerHTML = `<div class="cat-label-inner"><div class="cat-dot" style="background:${colors.dot}"></div><span class="cat-name" style="color:${colors.dot}">${cat}</span></div><div></div>`+
      days.map(()=>'<div></div>').join("");
    block.appendChild(catRow);

    // habit rows
    habits.forEach(habit=>{
      const streak = habitStreak(habit.id, days);
      const hrow = document.createElement("div");
      hrow.className = "row habit-row";

      // name cell
      const nameCell = document.createElement("div");
      nameCell.className = "habit-name";
      nameCell.innerHTML = `<span class="habit-emoji">${habit.emoji}</span><span class="habit-label">${habit.label}</span>`;
      hrow.appendChild(nameCell);

      // streak cell
      const strCell = document.createElement("div");
      strCell.className = "streak-cell";
      if (streak>0) {
        strCell.innerHTML = `<span class="streak-pill" style="background:${colors.bg};border:1px solid ${colors.border};color:${colors.dot}">🔥 ${streak}</span>`;
      } else {
        strCell.innerHTML = `<span class="streak-empty">—</span>`;
      }
      hrow.appendChild(strCell);

      // day cells
      days.forEach(d=>{
        const dk = fmtKey(d);
        const done = ck(habit.id, dk);
        const isToday = dk===tk;
        const colDiv = document.createElement("div");
        colDiv.className = "cell-col"+(isToday?" today-col":"");

        const wrap = document.createElement("div");
        wrap.className = "cell-wrap";

        const btn = document.createElement("button");
        btn.className = "cell"+(done?" done":"")+(isToday?" today":"");
        btn.title = `${habit.label} — ${d.toLocaleDateString("en-US",{month:"short",day:"numeric"})}`;
        if (done) {
          const checkColor = isToday?"#60c8f0":"#34d399";
          btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2.5 6.5L5.5 9.5L10.5 4" stroke="${checkColor}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
        }
        btn.addEventListener("click", ()=>toggle(habit.id, dk));
        wrap.appendChild(btn);
        colDiv.appendChild(wrap);
        hrow.appendChild(colDiv);
      });

      block.appendChild(hrow);
    });
    grid.appendChild(block);
  });

  // ---- Legend ----
  const legend = document.createElement("div");
  legend.className = "legend";
  legend.innerHTML = `
    <div class="legend-item"><div class="legend-swatch" style="background:rgba(52,211,153,.4);border:1px solid rgba(52,211,153,.5)"></div>All done</div>
    <div class="legend-item"><div class="legend-swatch" style="background:rgba(96,165,250,.4);border:1px solid rgba(96,165,250,.5)"></div>60%+ done</div>
    <div class="legend-item"><div class="legend-swatch" style="background:rgba(251,146,60,.4);border:1px solid rgba(251,146,60,.5)"></div>In progress</div>
    <div class="legend-note">🔥 = current streak (days in a row)</div>
  `;
  grid.appendChild(legend);
}

refresh();
</script>
</body>
</html>
